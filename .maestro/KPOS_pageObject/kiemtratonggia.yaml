appId: kingfood.kpos.app.dev
---
- runScript: ../KPOS_locator/KPOS_locator.js

- runFlow:
    when:
      true: ${typeof PRODUCT_CODE_1 !== 'undefined' && PRODUCT_CODE_1 !== ''}
    commands:
      - assertVisible:
          text: "txt-invoice-line-item-total-price-${PRODUCT_CODE_1}\n${EXPECTED_PRICE_1}"
      - runFlow:
          when:
            true: "${typeof PROMO_TEXT_1 !== 'undefined' && PROMO_TEXT_1 !== ''}"
          commands:
            - assertVisible:
                text: ".*${PROMO_TEXT_1}.*"


appId: kingfood.kpos.app.dev
---
# Hỗ trợ backward compatibility cho các testcase cũ chỉ truyền PRODUCT_CODE
- runFlow:
    when:
      true: ${typeof PRODUCT_CODE !== 'undefined' && PRODUCT_CODE !== ''}
    file: themsanphamonly_single.yaml
    env:
      PRODUCT_CODE: ${PRODUCT_CODE}
      QUANTITY: "${typeof QUANTITY !== 'undefined' ? QUANTITY : '1'}"

